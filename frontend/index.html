<!DOCTYPE html>
<html>
<head>
    <title>Import Export - Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Contact Us</h2>

<form id="contactForm">
    <input type="text" id="name" placeholder="Name" required><br><br>
    <input type="email" id="email" placeholder="Email" required><br><br>
    <input type="text" id="country" placeholder="Country"><br><br>
    <input type="text" id="serviceNeeded" placeholder="Service Needed"><br><br>
    <textarea id="message" placeholder="Message"></textarea><br><br>
    <button type="submit">Submit</button>
</form>

<script src="script.js"></script>

</body>
</html>
