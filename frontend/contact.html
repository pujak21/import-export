<!DOCTYPE html>
<html>
<head>
    <title>Bulk / Export Inquiry - Turmexa Organic</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="contact-section">
    <div class="contact-container">

        <h2>Bulk / Export Inquiry</h2>
        <p>Partner with Turmexa Organic for premium Lakadong Turmeric & Moringa exports. 
        We support bulk orders, private labeling & global documentation.</p>

        <form id="contactForm">

            <input type="text" id="name" placeholder="Full Name" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="text" id="country" placeholder="Country">
            <input type="text" id="serviceNeeded" placeholder="Product Needed (Turmeric / Moringa)">
            <textarea id="message" placeholder="Message"></textarea>

            <button type="submit">Send Inquiry</button>

        </form>

        <p id="responseMessage"></p>

    </div>
</section>

<script src="script.js"></script>
</body>
</html>
